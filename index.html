<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>ai-shell ~ terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --green: #39d353;
            --cyan: #58d1eb;
            --yellow: #e3b341;
            --red: #f85149;
            --purple: #bc8cff;
            --white: #e6edf3;
            --muted: #8b949e;
            --prompt-user: #58d1eb;
            --prompt-host: #39d353;
            --prompt-path: #e3b341;
            --app-height: 100vh;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: var(--app-height);
            overflow: hidden;
            background: var(--bg);
            color: var(--white);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            position: fixed;
            width: 100%;
        }

        /* --- TITLE BAR --- */
        .titlebar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 38px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            z-index: 100;
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: var(--red); }
        .yellow { background: var(--yellow); }
        .green { background: var(--green); }

        .tab-title { font-size: 11px; color: var(--muted); flex-grow: 1; text-align: center; }

        /* --- MAIN WORKSPACE --- */
        .workspace {
            display: flex;
            height: calc(var(--app-height) - 38px);
            width: 100%;
            position: relative;
        }

        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg);
        }

        /* TERMINAL AREA */
        #terminal {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scroll-behavior: smooth;
        }

        .line { margin-bottom: 8px; line-height: 1.5; word-break: break-word; }
        .ps1 { color: var(--prompt-host); font-weight: 600; }
        .ps1-path { color: var(--prompt-path); }
        .user-cmd { color: var(--white); margin-left: 8px; }
        
        .response {
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            margin-top: 5px;
            border-left: 2px solid var(--border);
        }

        /* SUGGESTIONS */
        .suggestions {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            overflow-x: auto;
            white-space: nowrap;
            background: var(--surface);
            border-top: 1px solid var(--border);
            -ms-overflow-style: none; 
            scrollbar-width: none;
        }
        .suggestions::-webkit-scrollbar { display: none; }
        
        .sug {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .sug:hover { background: var(--border); color: var(--white); }

        /* INPUT AREA */
        .input-line {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: var(--surface);
            gap: 10px;
        }
        .ps1-live { color: var(--cyan); font-weight: bold; }
        #cmdInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--white);
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        /* OUTPUT PANEL (SMBUNYIKAN SECARA DEFAULT) */
        .output-panel {
            display: none; /* Sembunyi total secara default */
            width: 450px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .output-panel.open {
            display: flex; /* Hanya tampil jika class 'open' ada */
        }

        .panel-topbar {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .panel-tabs { display: flex; gap: 5px; flex: 1; }
        .ptab {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--muted);
        }
        .ptab.active { background: var(--bg); color: var(--cyan); border: 1px solid var(--border); }
        .panel-close { cursor: pointer; color: var(--muted); font-size: 18px; padding: 0 5px; }

        .panel-content { flex: 1; overflow: auto; position: relative; }
        
        /* MOBILE OPTIMIZATIONS */
        @media (max-width: 768px) {
            .workspace { flex-direction: column; }
            .output-panel {
                display: flex; /* Di mobile kita butuh flex untuk animasi, tapi transform yang sembunyikan */
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 70%;
                border-left: none;
                border-top: 1px solid var(--cyan);
                border-radius: 20px 20px 0 0;
                transform: translateY(110%); /* Sembunyikan ke bawah layar */
                z-index: 200;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
                visibility: hidden; /* Tambahan agar tidak bisa diklik saat sembunyi */
            }
            .output-panel.open { 
                transform: translateY(0); 
                visibility: visible;
            }
            
            .panel-topbar {
                padding-top: 20px;
            }
            /* Indikator Tarik Bottom Sheet */
            .panel-topbar::before {
                content: '';
                width: 40px;
                height: 4px;
                background: var(--border);
                border-radius: 2px;
                position: absolute;
                top: 8px;
                left: 50%;
                transform: translateX(-50%);
            }

            #cmdInput { font-size: 16px; } 
            .left-col { height: 100%; }
        }

        /* --- COMPONENTS --- */
        #codeDisplay { padding: 15px; color: var(--white); font-size: 13px; line-height: 1.6; tab-size: 4; white-space: pre-wrap; }
        #previewFrame { width: 100%; height: 100%; border: none; background: white; }
        .image-body { height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; }
        svg { max-width: 100%; max-height: 100%; }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body>

<div class="titlebar">
    <div class="dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
    </div>
    <div class="tab-title">san@ai-terminal: ~</div>
</div>

<div class="workspace">
    <div class="left-col">
        <div id="terminal">
            <div class="line">
                <span class="ps1">visitor@ai-shell</span>:<span class="ps1-path">~</span>$ 
                <span class="user-cmd">halo! apa yang bisa kamu lakukan?</span>
            </div>
            <div class="line response">
                Halo! Saya adalah asisten terminal. Kamu bisa mengetik pesan biasa, 
                atau gunakan <span style="color:var(--purple)">code:</span> untuk membuat kode, 
                dan <span style="color:var(--yellow)">image:</span> untuk generate gambar SVG.
            </div>
        </div>

        <div class="suggestions" id="suggestions">
            <button class="sug" onclick="useSug('apa itu AI?')">apa itu AI?</button>
            <button class="sug" onclick="useSug('code: kalkulator sederhana')">code: kalkulator</button>
            <button class="sug" onclick="useSug('image: ikon roket')">image: roket</button>
        </div>

        <div class="input-line">
            <span class="ps1-live">❯</span>
            <input type="text" id="cmdInput" placeholder="Ketik perintah..." autocomplete="off" autofocus>
        </div>
    </div>

    <div class="output-panel" id="outputPanel">
        <div class="panel-topbar">
            <div class="panel-tabs">
                <div class="ptab active" onclick="switchTab('code')">CODE</div>
                <div class="ptab" onclick="switchTab('preview')">PREVIEW</div>
                <div class="ptab" onclick="switchTab('image')">IMAGE</div>
            </div>
            <div class="panel-close" onclick="togglePanel(false)">×</div>
        </div>
        <div class="panel-content">
            <div id="codeView" class="tab-view">
                <pre id="codeDisplay">// Kode akan muncul di sini...</pre>
            </div>
            <div id="previewView" class="tab-view" style="display:none">
                <iframe id="previewFrame"></iframe>
            </div>
            <div id="imageView" class="tab-view" style="display:none">
                <div class="image-body" id="imageBody">
                    <span class="muted" style="color: var(--muted)">Belum ada gambar.</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const cmdInput = document.getElementById('cmdInput');
    const terminal = document.getElementById('terminal');
    const outputPanel = document.getElementById('outputPanel');
    const codeDisplay = document.getElementById('codeDisplay');
    const previewFrame = document.getElementById('previewFrame');
    const imageBody = document.getElementById('imageBody');

    const apiKey = ""; 

    // Perbaikan Tinggi Mobile
    function setHeight() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${vh}px`);
    }
    window.addEventListener('resize', setHeight);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', setHeight);
    setHeight();

    // Logika Terminal
    cmdInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && cmdInput.value.trim()) {
            const val = cmdInput.value;
            cmdInput.value = '';
            addLog(val, 'user');
            await processCommand(val);
        }
    });

    function addLog(text, role) {
        const line = document.createElement('div');
        line.className = 'line';
        if (role === 'user') {
            line.innerHTML = `<span class="ps1">visitor</span>:<span class="ps1-path">~</span>$ <span class="user-cmd">${text}</span>`;
        } else {
            line.className = 'line response';
            line.innerHTML = text;
        }
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function processCommand(cmd) {
        const loadingLine = document.createElement('div');
        loadingLine.className = 'line response';
        loadingLine.innerHTML = `<span class="loading-dots">AI sedang berpikir</span>`;
        terminal.appendChild(loadingLine);
        terminal.scrollTop = terminal.scrollHeight;

        try {
            const isCode = cmd.toLowerCase().startsWith('code:');
            const isImg = cmd.toLowerCase().startsWith('image:');

            let systemPrompt = "Kamu adalah terminal AI asisten. Jawab dengan sangat singkat.";
            if (isCode) systemPrompt = "Generate kode saja di dalam triple backticks.";
            if (isImg) systemPrompt = "Generate HANYA kode SVG mentah tanpa penjelasan.";

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: cmd }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                })
            });

            const data = await response.json();
            const result = data.candidates[0].content.parts[0].text;
            
            loadingLine.remove();

            if (isCode) {
                const code = result.replace(/```\w*\n?|```/g, '');
                codeDisplay.textContent = code.trim();
                updatePreview(code);
                addLog("Kode berhasil dibuat. Membuka panel...", "ai");
                togglePanel(true);
                switchTab('code');
            } else if (isImg) {
                const svg = result.match(/<svg[\s\S]*<\/svg>/)?.[0] || "Gagal generate SVG.";
                imageBody.innerHTML = svg;
                addLog("Gambar SVG berhasil dibuat. Membuka panel...", "ai");
                togglePanel(true);
                switchTab('image');
            } else {
                addLog(result, "ai");
            }
        } catch (err) {
            loadingLine.innerHTML = "Terjadi kesalahan koneksi.";
        }
    }

    function updatePreview(code) {
        const blob = new Blob([code], { type: 'text/html' });
        previewFrame.src = URL.createObjectURL(blob);
    }

    function togglePanel(show) {
        if (show) {
            outputPanel.classList.add('open');
        } else {
            outputPanel.classList.remove('open');
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
        
        document.getElementById(tab + 'View').style.display = 'block';
        // Menangani pemilihan tab dengan benar
        const tabs = document.querySelectorAll('.ptab');
        tabs.forEach(t => {
            if(t.innerText.toLowerCase() === tab) t.classList.add('active');
        });
    }

    function useSug(text) {
        cmdInput.value = text;
        cmdInput.focus();
    }
</script>

</body>
</html>
