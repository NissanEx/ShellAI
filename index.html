<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>ai-shell ~ terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --green: #39d353;
            --cyan: #58d1eb;
            --yellow: #e3b341;
            --red: #f85149;
            --purple: #bc8cff;
            --white: #e6edf3;
            --muted: #8b949e;
            --prompt-host: #39d353;
            --prompt-path: #e3b341;
            --app-height: 100vh;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: var(--app-height);
            overflow: hidden;
            background: var(--bg);
            color: var(--white);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            position: fixed;
            width: 100%;
        }

        /* --- TITLE BAR --- */
        .titlebar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 38px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            z-index: 100;
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: var(--red); }
        .yellow { background: var(--yellow); }
        .green { background: var(--green); }

        .tab-title { font-size: 11px; color: var(--muted); flex-grow: 1; text-align: center; }

        /* --- MAIN WORKSPACE --- */
        .workspace {
            display: flex;
            height: calc(var(--app-height) - 38px);
            width: 100%;
            position: relative;
        }

        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg);
            width: 100%; /* Memastikan mengambil lebar penuh */
        }

        /* TERMINAL AREA */
        #terminal {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scroll-behavior: smooth;
        }

        .line { margin-bottom: 8px; line-height: 1.5; word-break: break-word; }
        .ps1 { color: var(--prompt-host); font-weight: 600; }
        .ps1-path { color: var(--prompt-path); }
        .user-cmd { color: var(--white); margin-left: 8px; }
        
        .response {
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            margin-top: 5px;
            border-left: 2px solid var(--border);
        }

        /* SUGGESTIONS */
        .suggestions {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            overflow-x: auto;
            white-space: nowrap;
            background: var(--surface);
            border-top: 1px solid var(--border);
            -ms-overflow-style: none; 
            scrollbar-width: none;
        }
        .suggestions::-webkit-scrollbar { display: none; }
        
        .sug {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .sug:hover { background: var(--border); color: var(--white); }

        /* INPUT AREA */
        .input-line {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: var(--surface);
            gap: 10px;
        }
        .ps1-live { color: var(--cyan); font-weight: bold; }
        #cmdInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--white);
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        /* MOBILE OPTIMIZATIONS */
        @media (max-width: 768px) {
            #cmdInput { font-size: 16px; } 
            .left-col { height: 100%; }
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        
        /* Code block in terminal styling */
        .terminal-code {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            margin-top: 5px;
            font-size: 12px;
            overflow-x: auto;
            border: 1px solid var(--border);
            display: block;
            white-space: pre;
        }
    </style>
</head>
<body>

<div class="titlebar">
    <div class="dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
    </div>
    <div class="tab-title">san@ai-terminal: ~</div>
</div>

<div class="workspace">
    <div class="left-col">
        <div id="terminal">
            <div class="line">
                <span class="ps1">visitor@ai-shell</span>:<span class="ps1-path">~</span>$ 
                <span class="user-cmd">halo! terminal ini sekarang lebih luas.</span>
            </div>
            <div class="line response">
                Halo! Panel kanan telah dihapus. Semua jawaban AI akan langsung ditampilkan di sini, di dalam aliran terminal ini.
            </div>
        </div>

        <div class="suggestions" id="suggestions">
            <button class="sug" onclick="useSug('apa itu AI?')">apa itu AI?</button>
            <button class="sug" onclick="useSug('buatkan kode python hello world')">hello world python</button>
            <button class="sug" onclick="useSug('image: matahari terbit')">image: matahari</button>
        </div>

        <div class="input-line">
            <span class="ps1-live">❯</span>
            <input type="text" id="cmdInput" placeholder="Ketik perintah..." autocomplete="off" autofocus>
        </div>
    </div>
</div>

<script>
    const cmdInput = document.getElementById('cmdInput');
    const terminal = document.getElementById('terminal');

    const apiKey = ""; 

    // Perbaikan Tinggi Mobile
    function setHeight() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${vh}px`);
    }
    window.addEventListener('resize', setHeight);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', setHeight);
    setHeight();

    // Logika Terminal
    cmdInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && cmdInput.value.trim()) {
            const val = cmdInput.value;
            cmdInput.value = '';
            addLog(val, 'user');
            await processCommand(val);
        }
    });

    function addLog(text, role) {
        const line = document.createElement('div');
        line.className = 'line';
        if (role === 'user') {
            line.innerHTML = `<span class="ps1">visitor</span>:<span class="ps1-path">~</span>$ <span class="user-cmd">${text}</span>`;
        } else {
            line.className = 'line response';
            line.innerHTML = text;
        }
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function processCommand(cmd) {
        const loadingLine = document.createElement('div');
        loadingLine.className = 'line response';
        loadingLine.innerHTML = `<span class="loading-dots">AI sedang berpikir</span>`;
        terminal.appendChild(loadingLine);
        terminal.scrollTop = terminal.scrollHeight;

        try {
            const isCode = cmd.toLowerCase().includes('kode') || cmd.toLowerCase().includes('code');
            const isImg = cmd.toLowerCase().startsWith('image:');

            let systemPrompt = "Kamu adalah terminal AI asisten. Jawab dengan singkat.";
            if (isCode) systemPrompt = "Jika memberikan kode, sertakan di dalam blok markdown.";
            if (isImg) systemPrompt = "Berikan deskripsi singkat tentang gambar tersebut karena tampilan visual dinonaktifkan.";

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: cmd }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                })
            });

            const data = await response.json();
            let result = data.candidates[0].content.parts[0].text;
            
            loadingLine.remove();

            // Format sederhana untuk blok kode di dalam terminal
            if (result.includes('```')) {
                result = result.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                    return `<code class="terminal-code">${code.trim()}</code>`;
                });
            }

            addLog(result, "ai");
        } catch (err) {
            loadingLine.innerHTML = "Terjadi kesalahan koneksi.";
        }
    }

    function useSug(text) {
        cmdInput.value = text;
        cmdInput.focus();
    }
</script>

</body>
</html>
